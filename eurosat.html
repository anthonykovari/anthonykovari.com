<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chicagoland Land Use Change — Anthony Kovari</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
    html, body { height: 100%; margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #0d1117; color: #e6edf3; overflow: hidden; }

    #map { position: absolute; inset: 0; background: #1a1e24; }

    /* ── floating panels ── */
    .panel {
      position: absolute;
      z-index: 1000;
      background: rgba(13, 17, 23, 0.88);
      border: 1px solid rgba(48, 54, 61, 0.8);
      border-radius: 10px;
      backdrop-filter: blur(6px);
      padding: 14px 16px;
    }

    #title-card {
      top: 16px; left: 16px;
      max-width: 260px;
    }
    #title-card h1 { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
    #title-card p  { font-size: 0.75rem; color: #8b949e; line-height: 1.5; margin: 0; }
    .panel-link { display: block; font-size: 0.7rem; color: #58a6ff; text-decoration: none; margin-bottom: 8px; }
    .panel-link:hover { color: #79c0ff; }

    #stats-card {
      top: 16px; left: 50%; transform: translateX(-50%);
      min-width: 200px; text-align: center;
    }
    #stats-year  { font-size: 1.4rem; font-weight: 700; color: #fff; }
    #stats-tiles { font-size: 0.75rem; color: #8b949e; margin-top: 2px; }

    #legend {
      top: 16px; right: 16px;
      max-width: 240px;
    }
    #legend h2 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #8b949e; margin-bottom: 10px; }
    #legend-cmp-header { display: flex; justify-content: flex-end; gap: 0; font-size: 0.68rem; font-weight: 600; margin-bottom: 6px; margin-top: -4px; }
    .legend-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; font-size: 0.78rem; color: #c9d1d9; }
    .legend-name { flex: 1; }
    .legend-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
    .legend-pct  { font-size: 0.72rem; color: #58a6ff; min-width: 36px; text-align: right; font-variant-numeric: tabular-nums; }
    .legend-pct2 { font-size: 0.72rem; color: #3fb950; min-width: 36px; text-align: right; font-variant-numeric: tabular-nums; display: none; }

    /* ── bottom controls ── */
    #controls {
      bottom: 0; left: 0; right: 0;
      border-radius: 10px 10px 0 0;
      padding: 16px 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .ctrl-row { display: flex; align-items: center; gap: 16px; }

    .mode-btn {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      padding: 5px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .mode-btn.active { background: #388bfd; border-color: #388bfd; color: #fff; }

    label { font-size: 0.78rem; color: #8b949e; white-space: nowrap; }

    input[type=range] {
      flex: 1;
      accent-color: #388bfd;
      cursor: pointer;
    }

    select {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      padding: 4px 8px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .year-label { font-size: 0.85rem; font-weight: 600; color: #e6edf3; min-width: 36px; text-align: center; }

    /* ── compare divider ── */
    #divider {
      position: absolute;
      top: 0; bottom: 0;
      width: 3px;
      background: #fff;
      z-index: 999;
      cursor: ew-resize;
      display: none;
    }
    #divider-handle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 32px; height: 32px;
      background: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      color: #0d1117;
      font-size: 0.85rem;
      user-select: none;
    }

    /* ── sprawl / compare panel ── */
    #sprawl-panel {
      top: 16px; right: 16px;
      width: 310px;
      display: none;
    }
    #sprawl-panel h2 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #8b949e; margin-bottom: 4px; }
    #sprawl-subtitle  { font-size: 0.68rem; color: #58a6ff; margin-bottom: 10px; }
    .sp-row {
      display: grid;
      grid-template-columns: 14px 1fr 54px 54px 58px 46px;
      align-items: center;
      gap: 4px;
      margin-bottom: 4px;
      font-size: 0.72rem;
    }
    .sp-header { color: #8b949e; font-size: 0.65rem; font-weight: 600; margin-bottom: 6px; }
    .sp-swatch { width: 14px; height: 14px; border-radius: 3px; }
    .sp-name   { color: #c9d1d9; }
    .sp-val    { text-align: right; color: #8b949e; font-variant-numeric: tabular-nums; }
    .sp-delta  { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }
    .sp-pct    { text-align: right; font-size: 0.68rem; font-variant-numeric: tabular-nums; }
    .pos { color: #3fb950; }
    .neg { color: #f85149; }
    #sprawl-unavail { font-size: 0.72rem; color: #8b949e; font-style: italic; margin-top: 6px; }

  </style>
</head>
<body>

<div id="map"></div>

<div class="panel" id="title-card">
  <a href="index.html" class="panel-link">← Back</a>
  <h1>Chicagoland Land Use</h1>
  <p>EuroSAT ResNet-18 on Sentinel-2 10 m RGB</p>
  <a href="https://github.com/anthonykovari/eurosat_classification" target="_blank" rel="noopener noreferrer" class="panel-link" style="margin-top:6px;">GitHub →</a>
</div>

<div class="panel" id="stats-card">
  <div id="stats-year">—</div>
  <div id="stats-tiles"></div>
</div>

<div class="panel" id="legend">
  <h2>Land Use</h2>
  <div id="legend-cmp-header"></div>
  <div id="legend-rows"></div>
</div>

<div id="divider">
  <div id="divider-handle">⇔</div>
</div>

<div class="panel" id="sprawl-panel">
  <h2>Land Cover Change</h2>
  <div id="sprawl-subtitle"></div>
  <div id="sprawl-unavail" style="display:none"></div>
  <div id="sprawl-rows"></div>
</div>

<div class="panel" id="controls">
  <div class="ctrl-row">
    <button class="mode-btn active" id="btn-timeline">Timeline</button>
    <button class="mode-btn" id="btn-compare">Compare</button>
    <div style="flex:1"></div>
  </div>

  <!-- timeline mode -->
  <div class="ctrl-row" id="row-timeline">
    <label>Year</label>
    <span class="year-label" id="lbl-year">—</span>
    <input type="range" id="slider-year" min="0" max="0" step="1" value="0" />
    <label>Opacity</label>
    <input type="range" id="slider-opacity" min="0" max="100" value="65" style="max-width:120px" />
  </div>

  <!-- compare mode -->
  <div class="ctrl-row" id="row-compare" style="display:none">
    <label>From</label>
    <select id="sel-from"></select>
    <label>To</label>
    <select id="sel-to"></select>
    <label style="margin-left:16px">Opacity</label>
    <input type="range" id="slider-opacity-cmp" min="0" max="100" value="65" style="max-width:120px" />
    <label style="margin-left:8px; color:#c9d1d9; font-style:italic; font-size:0.75rem">← drag line on map →</label>
  </div>
</div>

<script>
const STATIC = '/static/eurosat';
const AOI  = [[41.45, -88.4], [42.75, -87.5]];

let avail      = null;
let years      = [];
let mode       = 'timeline';
let sprawlData = null;

let timelineOverlay = null;
let leftOverlay     = null;
let rightOverlay    = null;

let satTimeline = null;
let satLeft     = null;
let satRight    = null;

function makeSatOverlay(year) {
  return L.imageOverlay(`${STATIC}/satellite/${year}.png`, AOI, {
    opacity: 1, interactive: false, crossOrigin: true,
  });
}

function loadSatBase(year) {
  if (satTimeline) map.removeLayer(satTimeline);
  satTimeline = makeSatOverlay(year).addTo(map);
  satTimeline.setZIndex(1);
}

function loadSatCompare(ya, yb) {
  if (satLeft)  map.removeLayer(satLeft);
  if (satRight) map.removeLayer(satRight);
  satLeft  = makeSatOverlay(ya).addTo(map);
  satRight = makeSatOverlay(yb).addTo(map);
  satLeft.setZIndex(1);
  satRight.setZIndex(1);
}

const map = L.map('map', { zoomControl: false, maxZoom: 14 }).setView([42.0, -87.95], 10);
L.control.zoom({ position: 'bottomright' }).addTo(map);

const MIN_GRID_ZOOM = 13;
const CLASS_ABBREVS = ['Crop','Forest','Herb','Road','Indust','Pasture','P.Crop','Resid','River','Lake'];
const CANVAS_PAD = 400;

let gridCache = {};

const gridCanvas = document.createElement('canvas');
gridCanvas.style.cssText = 'position:absolute;pointer-events:none;';
map.getPanes().overlayPane.appendChild(gridCanvas);

function yearAvail(year) {
  return (avail?.availability?.[String(year)]) || { satellite: false, classification: false };
}

async function init() {
  try {
    const res = await fetch(`${STATIC}/available.json`);
    if (!res.ok) throw new Error(res.statusText);
    avail = await res.json();
  } catch {
    document.getElementById('stats-tiles').textContent = 'Data unavailable — try again later.';
    return;
  }

  years = avail.years.filter(y => y !== 2026 && y !== 2019);

  if (!years.length) {
    document.getElementById('stats-year').textContent = '—';
    return;
  }

  const yr0 = years[0], yrN = years[years.length - 1];
  document.querySelector('#title-card p').textContent =
    `Sentinel-2 10 m RGB · ${yr0}${yrN !== yr0 ? '–' + yrN : ''}`;

  if (years.length < 2) setLayerButtonState('btn-compare', false);

  fetch(`${STATIC}/sprawl.json`).then(r => r.ok ? r.json() : null).then(d => { sprawlData = d; }).catch(() => {});

  rebuildLegend();
  buildYearSelectors();
  setupControls();
  loadTimelineYear(years[0]);
}

function setLayerButtonState(id, enabled) {
  const btn = document.getElementById(id);
  btn.disabled = !enabled;
  btn.style.opacity = enabled ? '' : '0.35';
  btn.style.cursor  = enabled ? '' : 'not-allowed';
}

async function fetchGrid(year) {
  if (!gridCache[year]) {
    try {
      const res = await fetch(`${STATIC}/grid/${year}.json`);
      if (res.ok) gridCache[year] = await res.json();
    } catch (e) {
      console.warn('Grid fetch failed:', e);
    }
  }
  drawGrid(year);
  if (mode === 'timeline') updateLegendStats(year);
}

function drawGrid(year) {
  const zoom = map.getZoom();
  if (zoom < MIN_GRID_ZOOM || mode === 'compare' || !gridCache[year]) {
    gridCanvas.style.display = 'none';
    if (timelineOverlay) timelineOverlay.setOpacity(opacity());
    return;
  }

  if (timelineOverlay) timelineOverlay.setOpacity(0);
  gridCanvas.style.display = '';

  const { rows, cols, data } = gridCache[year];
  const [latMin, lonMin] = AOI[0];
  const [latMax, lonMax] = AOI[1];
  const dLat = (latMax - latMin) / rows;
  const dLon = (lonMax - lonMin) / cols;

  const size = map.getSize();
  const w = size.x + CANVAS_PAD * 2;
  const h = size.y + CANVAS_PAD * 2;

  const anchorLayer = map.containerPointToLayerPoint(L.point(-CANVAS_PAD, -CANVAS_PAD));
  L.DomUtil.setPosition(gridCanvas, anchorLayer);
  gridCanvas.width  = w;
  gridCanvas.height = h;

  const ctx = gridCanvas.getContext('2d');
  ctx.clearRect(0, 0, w, h);

  for (let r = 0; r < rows; r++) {
    const cellLatMax = latMax - r * dLat;
    const cellLatMin = cellLatMax - dLat;

    for (let c = 0; c < cols; c++) {
      const cellLonMin = lonMin + c * dLon;
      const cellLonMax = cellLonMin + dLon;

      const p1 = map.latLngToLayerPoint([cellLatMax, cellLonMin]);
      const p2 = map.latLngToLayerPoint([cellLatMin, cellLonMax]);

      const x = p1.x - anchorLayer.x;
      const y = p1.y - anchorLayer.y;
      const cw = p2.x - p1.x;
      const ch = p2.y - p1.y;

      if (x + cw < 0 || x > w || y + ch < 0 || y > h) continue;

      const ci = data[r * cols + c];
      const hex = avail.class_colors[ci];

      ctx.fillStyle = hex + 'aa';
      ctx.fillRect(x, y, cw, ch);

      ctx.strokeStyle = 'rgba(255,255,255,0.22)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 0.5, y + 0.5, cw - 1, ch - 1);

      if (cw >= 36 && ch >= 18) {
        const label = CLASS_ABBREVS[ci];
        const fs = Math.max(9, Math.min(cw / 5, 13));
        ctx.font = `bold ${fs}px 'Segoe UI', Arial, sans-serif`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        const cx = x + cw / 2, cy = y + ch / 2;
        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        ctx.fillText(label, cx + 1, cy + 1);
        ctx.fillStyle = '#fff';
        ctx.fillText(label, cx, cy);
      }
    }
  }
}

map.on('moveend zoomend', () => {
  if (mode === 'timeline') {
    const idx  = parseInt(document.getElementById('slider-year').value);
    drawGrid(years[idx]);
  }
});

map.on('move zoom', () => {
  if (mode === 'compare') applyDividerClip(dividerPct());
});

function rebuildLegend() {
  const container = document.getElementById('legend-rows');
  container.innerHTML = '';

  const names  = avail.class_names  || [];
  const colors = avail.class_colors || [];

  names.forEach((name, i) => {
    const row = document.createElement('div');
    row.className = 'legend-row';
    row.innerHTML = `<div class="legend-swatch" style="background:${colors[i]}"></div><span class="legend-name">${name}</span><span class="legend-pct"></span><span class="legend-pct2"></span>`;
    container.appendChild(row);
  });
}

function computeClassPct(year) {
  if (!gridCache[year]) return null;
  const { data } = gridCache[year];
  const counts = new Array(avail.class_names.length).fill(0);
  for (const ci of data) if (ci < counts.length) counts[ci]++;
  const total = data.length || 1;
  return counts.map(c => c / total * 100);
}

function updateLegendStats(ya, yb = null) {
  const pctA = computeClassPct(ya);
  const pctB = yb != null ? computeClassPct(yb) : null;

  const hdr = document.getElementById('legend-cmp-header');
  if (yb != null) {
    hdr.style.display = 'flex';
    hdr.innerHTML = `<span style="color:#58a6ff;flex:1;text-align:right">${ya}</span><span style="color:#3fb950;min-width:36px;text-align:right;padding-left:4px">${yb}</span>`;
  } else {
    hdr.style.display = 'none';
  }

  document.querySelectorAll('.legend-pct').forEach((el, i) => {
    el.textContent = pctA ? pctA[i].toFixed(0) + '%' : '';
  });
  document.querySelectorAll('.legend-pct2').forEach((el, i) => {
    el.style.display = yb != null ? '' : 'none';
    el.textContent   = pctB ? pctB[i].toFixed(0) + '%' : '';
  });
}

function updateSprawlPanel(ya, yb) {
  const panel   = document.getElementById('sprawl-panel');
  const unavail = document.getElementById('sprawl-unavail');
  const rows    = document.getElementById('sprawl-rows');
  const sub     = document.getElementById('sprawl-subtitle');

  panel.style.display = 'block';
  document.getElementById('legend').style.display = 'none';

  if (!sprawlData) {
    unavail.style.display = 'none';
    rows.innerHTML = '';
    sub.textContent = '';
    return;
  }

  const idxA = sprawlData.years.indexOf(ya);
  const idxB = sprawlData.years.indexOf(yb);
  if (idxA === -1 || idxB === -1) {
    unavail.style.display = 'none';
    rows.innerHTML = '';
    sub.textContent = '';
    return;
  }

  unavail.style.display = 'none';
  sub.textContent = `${ya} → ${yb}  ·  model ${sprawlData.model_version}`;

  const colors = avail.class_colors || [];

  const entries = sprawlData.classes.map((cls, i) => {
    const aKm2   = sprawlData.areas_km2[cls][idxA];
    const bKm2   = sprawlData.areas_km2[cls][idxB];
    const delta  = bKm2 - aKm2;
    const pct    = aKm2 > 0 ? delta / aKm2 * 100 : null;
    return { cls, color: colors[i], aKm2, bKm2, delta, pct };
  }).sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta));

  const fmt  = n => n >= 1000 ? (n / 1000).toFixed(1) + 'k' : n.toFixed(0);
  const sign  = n => n >= 0 ? '+' : '';

  rows.innerHTML = `
    <div class="sp-row sp-header">
      <span></span><span></span>
      <span style="text-align:right">${ya} km²</span>
      <span style="text-align:right">${yb} km²</span>
      <span style="text-align:right">Δ km²</span>
      <span style="text-align:right">Δ %</span>
    </div>
    ${entries.map(e => {
      const cls     = e.delta >= 0 ? 'pos' : 'neg';
      const pctStr  = e.pct != null ? `${sign(e.pct)}${e.pct.toFixed(1)}%` : '—';
      return `<div class="sp-row">
        <div class="sp-swatch" style="background:${e.color}"></div>
        <span class="sp-name">${e.cls}</span>
        <span class="sp-val">${fmt(e.aKm2)}</span>
        <span class="sp-val">${fmt(e.bKm2)}</span>
        <span class="sp-delta ${cls}">${sign(e.delta)}${fmt(e.delta)}</span>
        <span class="sp-pct  ${cls}">${pctStr}</span>
      </div>`;
    }).join('')}`;
}

function hideSprawlPanel() {
  document.getElementById('sprawl-panel').style.display = 'none';
  document.getElementById('legend').style.display = '';
}

function buildYearSelectors() {
  const slider = document.getElementById('slider-year');
  slider.max   = years.length - 1;
  slider.value = 0;
  document.getElementById('lbl-year').textContent = years[0];

  ['sel-from', 'sel-to'].forEach((id, i) => {
    const sel = document.getElementById(id);
    years.forEach(y => sel.add(new Option(y, y)));
    sel.value = years[i === 0 ? 0 : years.length - 1];
  });
}

function makeOverlay(year) {
  return L.imageOverlay(`${STATIC}/overlay/${year}.png`, AOI, {
    opacity: opacity(),
    interactive: false,
    crossOrigin: true,
  });
}

function opacity() {
  const id = mode === 'compare' ? 'slider-opacity-cmp' : 'slider-opacity';
  return document.getElementById(id).value / 100;
}

function updateStatsCard(year) {
  document.getElementById('stats-year').textContent = year;
  const ya = yearAvail(year);
  document.getElementById('stats-tiles').textContent =
    ya.classification ? 'Tile classification' : 'Satellite imagery only';
}

function loadTimelineYear(year) {
  loadSatBase(year);
  if (timelineOverlay) map.removeLayer(timelineOverlay);

  const ya = yearAvail(year);
  timelineOverlay = ya.classification ? makeOverlay(year).addTo(map) : null;

  updateStatsCard(year);
  if (ya.classification) fetchGrid(year);
}

async function loadCompare() {
  const ya = parseInt(document.getElementById('sel-from').value);
  const yb = parseInt(document.getElementById('sel-to').value);
  if (ya === yb) return;

  if (leftOverlay)  map.removeLayer(leftOverlay);
  if (rightOverlay) map.removeLayer(rightOverlay);

  loadSatCompare(ya, yb);

  const availA = yearAvail(ya);
  const availB = yearAvail(yb);
  const hasLayerA = availA.classification;
  const hasLayerB = availB.classification;

  leftOverlay  = hasLayerA ? makeOverlay(ya).addTo(map) : null;
  rightOverlay = hasLayerB ? makeOverlay(yb).addTo(map) : null;

  const applyClip = () => applyDividerClip(dividerPct());
  if (leftOverlay)  leftOverlay.once('load',  applyClip);
  if (rightOverlay) rightOverlay.once('load', applyClip);
  satLeft.once('load',  applyClip);
  satRight.once('load', applyClip);

  document.getElementById('stats-year').textContent = `${ya}  →  ${yb}`;
  document.getElementById('stats-tiles').textContent = 'drag the line to compare';

  const load = async yr => {
    if (!gridCache[yr] && yearAvail(yr).classification) {
      try {
        const res = await fetch(`${STATIC}/grid/${yr}.json`);
        if (res.ok) gridCache[yr] = await res.json();
      } catch (e) { console.warn('Grid fetch failed:', e); }
    }
  };
  await Promise.all([load(ya), load(yb)]);
  updateLegendStats(ya, yb);
  updateSprawlPanel(ya, yb);
}

const dividerEl = document.getElementById('divider');
let dragging = false;

function dividerPct() {
  return parseFloat(dividerEl.style.left || '50%');
}

function applyDividerClip(pct) {
  dividerEl.style.left = pct + '%';

  const mapRect = document.getElementById('map').getBoundingClientRect();
  const clipX = mapRect.left + mapRect.width * (pct / 100);

  function clip(el, showLeft) {
    if (!el) return;
    const r = el.getBoundingClientRect();
    el.style.clipPath = showLeft
      ? `inset(0 ${Math.max(0, r.right  - clipX)}px 0 0)`
      : `inset(0 0 0 ${Math.max(0, clipX - r.left)}px)`;
  }

  clip(leftOverlay?.getElement(),  true);
  clip(satLeft?.getElement(),      true);
  clip(rightOverlay?.getElement(), false);
  clip(satRight?.getElement(),     false);
}

dividerEl.addEventListener('mousedown', e => { dragging = true; e.preventDefault(); });
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const rect = document.getElementById('map').getBoundingClientRect();
  const pct  = Math.max(2, Math.min(98, (e.clientX - rect.left) / rect.width * 100));
  applyDividerClip(pct);
});
document.addEventListener('mouseup', () => { dragging = false; });

dividerEl.addEventListener('touchstart', e => { dragging = true; e.preventDefault(); }, { passive: false });
document.addEventListener('touchmove', e => {
  if (!dragging) return;
  const rect = document.getElementById('map').getBoundingClientRect();
  const pct  = Math.max(2, Math.min(98, (e.touches[0].clientX - rect.left) / rect.width * 100));
  applyDividerClip(pct);
}, { passive: false });
document.addEventListener('touchend', () => { dragging = false; });

function setupControls() {
  document.getElementById('btn-timeline').addEventListener('click', () => {
    mode = 'timeline';
    document.getElementById('btn-timeline').classList.add('active');
    document.getElementById('btn-compare').classList.remove('active');
    document.getElementById('row-timeline').style.display = '';
    document.getElementById('row-compare').style.display  = 'none';
    dividerEl.style.display = 'none';
    if (leftOverlay)  { map.removeLayer(leftOverlay);  leftOverlay  = null; }
    if (rightOverlay) { map.removeLayer(rightOverlay); rightOverlay = null; }
    const idx  = parseInt(document.getElementById('slider-year').value);
    loadTimelineYear(years[idx]);
    hideSprawlPanel();
    document.getElementById('legend-cmp-header').style.display = 'none';
    document.querySelectorAll('.legend-pct2').forEach(el => { el.style.display = 'none'; el.textContent = ''; });
  });

  document.getElementById('btn-compare').addEventListener('click', () => {
    if (years.length < 2) return;
    mode = 'compare';
    document.getElementById('btn-compare').classList.add('active');
    document.getElementById('btn-timeline').classList.remove('active');
    document.getElementById('row-compare').style.display  = '';
    document.getElementById('row-timeline').style.display = 'none';
    dividerEl.style.display = 'block';
    applyDividerClip(50);
    gridCanvas.style.display = 'none';
    if (timelineOverlay) { map.removeLayer(timelineOverlay); timelineOverlay = null; }
    loadCompare();
  });

  document.getElementById('slider-year').addEventListener('input', e => {
    const year = years[parseInt(e.target.value)];
    document.getElementById('lbl-year').textContent = year;
    loadTimelineYear(year);
  });

  ['slider-opacity', 'slider-opacity-cmp'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      const op = opacity();
      timelineOverlay?.setOpacity(op);
      leftOverlay?.setOpacity(op);
      rightOverlay?.setOpacity(op);
    });
  });

  ['sel-from', 'sel-to'].forEach(id => {
    document.getElementById(id).addEventListener('change', loadCompare);
  });
}

init();
</script>
</body>
</html>
