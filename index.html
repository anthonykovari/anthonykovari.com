<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anthony Kovari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
        html, body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
        main {
            position: fixed;
            inset: 0;
            overflow: hidden;
            touch-action: manipulation;
        }
    </style>
</head>
<body class="bg-white text-black antialiased overflow-hidden">
    <main class="h-screen w-full flex flex-col justify-between p-8 md:p-24 selection:bg-blue-100">

      <h1 class="text-[4rem] md:text-[6rem] lg:text-[6rem] font-normal leading-none tracking-tighter break-words pointer-events-none">
        Anthony Kovari
      </h1>

      <div class="flex flex-wrap gap-8">
        <a
          href="satellite-classifier.html"
          class="group flex flex-col items-center text-center space-y-2 max-w-[120px]"
        >
          <div class="w-16 h-20 bg-white border-2 border-black relative group-hover:border-blue-600 transition-colors flex items-center justify-center">
            <div class="absolute top-2 left-2 right-2 bottom-2 border border-black group-hover:border-blue-600 transition-colors"></div>
            <span class="text-2xl group-hover:text-blue-600 transition-colors">🛰️</span>
          </div>
          <span class="text-xs group-hover:text-blue-600 w-full px-1 break-words">Computer Vision - Satellite Image Classification</span>
        </a>
        <a
          href="wildlife-ai.html"
          class="group flex flex-col items-center text-center space-y-2 max-w-[120px]"
        >
          <div class="w-16 h-20 bg-white border-2 border-black relative group-hover:border-blue-600 transition-colors flex items-center justify-center">
            <div class="absolute top-2 left-2 right-2 bottom-2 border border-black group-hover:border-blue-600 transition-colors"></div>
            <span class="text-2xl group-hover:text-blue-600 transition-colors">🐦</span>
          </div>
          <span class="text-xs group-hover:text-blue-600 w-full px-1 break-words">Edge AI - Track Invasive and Endangered Birds</span>
        </a>
        <a
          href="aircraft-qa.html"
          class="group flex flex-col items-center text-center space-y-2 max-w-[120px]"
        >
          <div class="w-16 h-20 bg-white border-2 border-black relative group-hover:border-blue-600 transition-colors flex items-center justify-center">
            <div class="absolute top-2 left-2 right-2 bottom-2 border border-black group-hover:border-blue-600 transition-colors"></div>
            <span class="text-2xl group-hover:text-blue-600 transition-colors">✈️</span>
          </div>
          <span class="text-xs group-hover:text-blue-600 w-full px-1 break-words">ML Capstone - United Airlines Aircraft QA</span>
        </a>
      </div>

      <div class="space-y-1 text-base md:text-lg">
        <p>
          <a
            href="mailto:anthonykovari@gmail.com"
            class="hover:text-blue-600 transition-colors duration-75"
          >
            anthonykovari@gmail.com
          </a>
        </p>
        <p>
          <a
            href="https://github.com/anthonykovari"
            target="_blank"
            rel="noopener noreferrer"
            class="hover:text-blue-600 transition-colors duration-75"
          >
            github.com/anthonykovari
          </a>
        </p>
        <p>
          <a
            href="https://linkedin.com/in/anthonykovari"
            target="_blank"
            rel="noopener noreferrer"
            class="hover:text-blue-600 transition-colors duration-75"
          >
            linkedin.com/in/anthonykovari
          </a>
        </p>
      </div>

    </main>

    <script>
      function setViewportHeight() {
        const vh = window.innerHeight;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
        document.querySelector('main').style.height = `${vh}px`;
      }

      setViewportHeight();
      window.addEventListener('resize', setViewportHeight);
      window.addEventListener('orientationchange', setViewportHeight);
    </script>
</body>
</html>
