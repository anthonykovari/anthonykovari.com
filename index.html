<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anthony Kovari</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #111;
      overflow: hidden;
      position: fixed;
    }

    /* ── Layout ── */
    #app {
      height: 100vh;
      height: calc(var(--vh, 1vh) * 100);
      width: 100%;
      display: flex;
      flex-direction: column;
      padding: 48px 56px;
    }

    /* ── Header ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .name {
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: #111;
    }

    .contact {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .contact a {
      font-size: 0.85rem;
      color: #555;
      text-decoration: none;
      transition: color 0.15s;
    }

    .contact a:hover { color: #111; }

    /* ── Nav ── */
    nav {
      margin-top: auto;
      margin-bottom: 0;
    }

    nav ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    nav ul li a {
      font-size: 2.6rem;
      font-weight: 600;
      color: #111;
      text-decoration: none;
      letter-spacing: -0.02em;
      line-height: 1.2;
      transition: color 0.15s;
      cursor: pointer;
    }

    nav ul li a:hover { color: #888; }

    /* ── Modal Overlay ── */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.96);
      z-index: 100;
      padding: 48px 56px;
      overflow-y: auto;
    }

    #overlay.active { display: flex; flex-direction: column; }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 48px;
      flex-shrink: 0;
    }

    .modal-title {
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.4rem;
      color: #888;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      transition: color 0.15s;
    }

    .close-btn:hover { color: #111; }

    .modal-body {
      flex: 1;
      max-width: 640px;
    }

    /* ── About content ── */
    .about-text p {
      font-size: 1rem;
      line-height: 1.8;
      color: #333;
      margin-bottom: 20px;
    }

    /* ── Projects content ── */
    .project-list {
      display: flex;
      flex-direction: column;
      gap: 36px;
    }

    .project-item h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .project-item h3 a {
      color: #111;
      text-decoration: none;
      border-bottom: 1px solid #ddd;
      transition: border-color 0.15s;
    }

    .project-item h3 a:hover { border-color: #111; }

    .project-item .meta {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 8px;
    }

    .project-item p {
      font-size: 0.9rem;
      color: #444;
      line-height: 1.7;
    }

    /* ── Resume content ── */
    .resume-link {
      font-size: 0.95rem;
      color: #111;
      text-decoration: none;
      border-bottom: 1px solid #ddd;
      padding-bottom: 2px;
      transition: border-color 0.15s;
    }

    .resume-link:hover { border-color: #111; }

    /* ── Writings content ── */
    .writing-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .writing-item a {
      font-size: 0.95rem;
      color: #111;
      text-decoration: none;
      border-bottom: 1px solid #ddd;
      transition: border-color 0.15s;
    }

    .writing-item a:hover { border-color: #111; }

    .writing-item .date {
      font-size: 0.8rem;
      color: #888;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<div id="app">
  <header>
    <span class="name">Anthony Kovari</span>
    <div class="contact">
      <a href="mailto:anthonykovari@gmail.com">anthonykovari@gmail.com</a>
      <a href="https://github.com/anthonykovari" target="_blank">GitHub</a>
      <a href="https://linkedin.com/in/anthonykovari" target="_blank">LinkedIn</a>
    </div>
  </header>

  <nav>
    <ul>
      <li><a onclick="openModal('about')">About</a></li>
      <li><a onclick="openModal('resume')">Resume</a></li>
      <li><a onclick="openModal('projects')">Projects</a></li>
      <li><a onclick="openModal('writings')">Writings</a></li>
    </ul>
  </nav>
</div>

<!-- Modal Overlay -->
<div id="overlay">
  <div class="modal-header">
    <span class="modal-title" id="modalTitle"></span>
    <button class="close-btn" onclick="closeModal()">×</button>
  </div>
  <div class="modal-body" id="modalBody"></div>
</div>

<script>
  // Viewport height fix for mobile browsers
  function setVh() {
    document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
  }
  setVh();
  window.addEventListener('resize', setVh);
  window.addEventListener('orientationchange', setVh);

  // Modal content
  const content = {
    about: {
      title: 'About',
      body: `
        <div class="about-text">
          <p>Hi, I'm Anthony — a student and developer interested in machine learning, computer vision, and building things that work.</p>
          <p>I'm currently studying at the University of Washington. My work spans from training deep learning models to shipping full-stack applications.</p>
          <p>Outside of projects, I enjoy [your interests here].</p>
        </div>
      `
    },
    resume: {
      title: 'Resume',
      body: `
        <p style="color:#444; font-size:0.95rem; line-height:1.8; margin-bottom:24px;">
          My resume is available as a PDF.
        </p>
        <a class="resume-link" href="files/resume.pdf" target="_blank">Download Resume →</a>
      `
    },
    projects: {
      title: 'Projects',
      body: `
        <div class="project-list">
          <div class="project-item">
            <h3><a href="https://github.com/anthonykovari/eurosat_classification" target="_blank">Satellite Image Classifier</a></h3>
            <div class="meta">PyTorch · FastAPI · Docker · 2025</div>
            <p>Fine-tuned ResNet-18 on 27,000 labeled satellite images to classify land use across 10 categories, achieving 97–99% per-class validation accuracy. Served via a FastAPI backend and containerized with Docker.</p>
          </div>
        </div>
      `
    },
    writings: {
      title: 'Writings',
      body: `
        <div class="writing-list">
          <div class="writing-item">
            <a href="#">Nothing here yet.</a>
          </div>
        </div>
      `
    }
  };

  const overlay = document.getElementById('overlay');
  const modalTitle = document.getElementById('modalTitle');
  const modalBody = document.getElementById('modalBody');

  function openModal(section) {
    const { title, body } = content[section];
    modalTitle.textContent = title;
    modalBody.innerHTML = body;
    overlay.classList.add('active');
    overlay.scrollTop = 0;
  }

  function closeModal() {
    overlay.classList.remove('active');
  }

  // Close on click outside modal content
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeModal();
  });

  // Close on Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });
</script>

</body>
</html>
